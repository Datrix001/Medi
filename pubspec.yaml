name: medi_app
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_screenutil: ^5.9.3
  go_router: ^17.1.0
  json_annotation: ^4.11.0
  path_provider: ^2.1.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.19.0
  just_audio: ^0.9.36

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.12.2
  flutter_gen_runner: ^5.13.0
  json_serializable: ^6.13.0

flutter:
  uses-material-design: true
  assets:
    - assets/png/
    - assets/audio/
    - assets/colors/
    - assets/data/

flutter_gen:
  output: lib/gen/
  line_length: 80
  fonts:
    enabled: true
  colors:
    outputs:
      class_name: AppColors
    inputs:
      - assets/colors/colors.xml
